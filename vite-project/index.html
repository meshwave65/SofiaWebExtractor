<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sofia Control</title>

  <link rel="stylesheet" href="/src/style.css">

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
  ">
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">Sofia Control</div>

    <div class="menu">
      <button onclick="showView('insert')">➕ Insert</button>
      <button onclick="showView('tasks')">📦 Tasks</button>
      <button onclick="showView('files')">📁 Files</button>
      <button onclick="showView('search')">🔎 Search</button>
      <button onclick="showView('profile')">👤 Profile</button>
    </div>

    <div class="status">🟢 SYSTEM ONLINE</div>
  </div>

  <!-- INSERT -->
  <div id="view-insert" class="view">
    <h2>Insert Task</h2>

    <input id="link" placeholder="https://...">

    <input id="agent_new" placeholder="agent override">

    <button id="btnInsert">Insert</button>
    <button id="btnClear">Clear</button>
  </div>

  <!-- TASKS -->
  <div id="view-tasks" class="view">
    <h2>Tasks</h2>
    <div id="tasks"></div>
  </div>

  <!-- FILES -->
  <div id="view-files" class="view">
    <h2>Files</h2>
    <div id="files"></div>
  </div>

  <!-- SEARCH -->
  <div id="view-search" class="view">
    <h2>Search</h2>
    <input placeholder="search...">
  </div>

  <!-- PROFILE -->
  <div id="view-profile" class="view">
    <h2>Profile</h2>
  </div>

  <!-- ENTRYPOINT CORRETO VITE -->
  <script type="module" src="/src/main.js"></script>

</body>
</html>

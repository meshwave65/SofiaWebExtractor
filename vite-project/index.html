<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>TESTE DEPLOY RENDER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <!-- ================= NAV ================= -->
  <div class="tabs">
    <button onclick="showTab(1)">Auth</button>
    <button onclick="showTab(2)">Insert</button>
    <button onclick="showTab(3)">Tasks</button>
    <button onclick="showTab(4)">Files</button>
    <button onclick="showTab(5)">Search</button>
    <button onclick="showTab(6)">Profile</button>
  </div>

  <!-- ================= AUTH ================= -->
  <div class="tab" id="tab1">
    <h2>Auth</h2>

    <label>User / Email</label>
    <input id="login_email" placeholder="user_name ou email">

    <label>Password</label>
    <input id="login_pass" type="password" placeholder="password">

    <button onclick="login()">Login</button>
    <button onclick="openRegister()">Create Account</button>
  </div>

  <!-- ================= INSERT ================= -->
  <div class="tab" id="tab2">
    <h2>Insert</h2>

    <select></select>
    <input placeholder="agent override">
    <input placeholder="https://...">

    <button onclick="clearForm()">Clear</button>
    <button onclick="insertTask()">Insert</button>
  </div>

  <!-- ================= TASKS ================= -->
  <div class="tab" id="tab3">

    <!-- HEADER -->
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">TASKS</h2>
      <div style="font-size:12px; color:#8aa0b5;">
        User: <b id="taskUserName">...</b>
      </div>
    </div>

    <!-- CONTROLS -->
    <div style="display:flex; align-items:center; gap:10px; margin-top:12px;">

      <select id="filter_agent" style="width:140px;">
        <option value="ALL">All Agents</option>
      </select>

      <select id="filter_llm" style="width:140px;">
        <option value="ALL">All LLM</option>
      </select>

      <select id="filter_status" style="width:140px;">
        <option value="ALL">All Status</option>
      </select>

      <div style="margin-left:auto; display:flex; gap:6px;">
        <button onclick="runAction('RUN')" style="width:36px; background:#2f7d32; color:white;">▶</button>
        <button onclick="runAction('PAUSE')" style="width:36px; background:#666; color:white;">⏸</button>
        <button onclick="runAction('DELETE')" style="width:36px; background:#b83232; color:white;">■</button>
      </div>

    </div>

    <!-- SELECT ALL -->
    <div class="task-row" style="margin-top:15px;">
      <div class="task-check">
        <input type="checkbox" onchange="toggleAllTasks(this)">
      </div>
      <div></div>
      <div></div>
      <div></div>
    </div>

    <div id="tasks"></div>

  </div>

  <!-- ================= FILES ================= -->
  <div class="tab" id="tab4">
    <h2>FILES</h2>

    <div class="search-layout">

      <div id="files"></div>

      <div id="filePreview">
        Select a file...
      </div>

    </div>
  </div>

  <!-- ================= SEARCH ================= -->
  <div class="tab" id="tab5">

    <h2>SEARCH</h2>

    <div class="search-toolbar">
      <input id="searchInput" placeholder="Search artifacts..." />

      <button onclick="mockSearch()">Search</button>
      <button onclick="mockSummarize()">Resumir</button>
      <button onclick="mockEnrich()">Enriquecer</button>
    </div>

    <div class="search-actions">
      <label class="select-all">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
        Select All
      </label>

      <button onclick="downloadSelected()">Download</button>
    </div>

    <div class="search-layout">

      <div id="searchResults"></div>

      <div id="searchPreview">
        Select artifact...
      </div>

    </div>

  </div>

  <!-- ================= PROFILE ================= -->
  <div class="tab" id="tab6">

    <h2>Profile</h2>

    <div class="profile-grid">

      <input id="p_username" disabled placeholder="username">

      <input id="p_name" placeholder="full name">
      <input id="p_email" placeholder="email">
      <input id="p_tel" placeholder="phone">

      <input id="p_company" placeholder="company">
      <input id="p_role" placeholder="role">

      <input id="p_pass" type="password" placeholder="password">

    </div>

    <button onclick="saveProfile()">Save</button>

    <div id="profile_msg"></div>

  </div>

  <!-- ================= REGISTER ================= -->
  <div class="tab" id="tab7">

    <h2>Create Account</h2>

    <input id="reg_name" placeholder="Full name">
    <input id="reg_email" placeholder="Email">
    <input id="reg_tel" placeholder="Phone">

    <input id="reg_pass" type="password" placeholder="Password">
    <input id="reg_pass2" type="password" placeholder="Confirm Password">

    <button onclick="registerUser()">Create</button>

    <div id="reg_msg"></div>

  </div>
<!-- ================= FOOTER ================= -->
  <footer class="footer">

    <img class="logo"
      src="https://www.meshwave.com.br/assets/meshwave_logo_nova-C_vq8StO.png"
    />

    <div>
      <div class="t10">MeshWave Cyber Technologies ®</div>

      <div class="t8">
        Centro Empresarial Mourisco<br>
        Praia de Botafogo, 501 - 2º andar - Torre Rio Sul<br>

        <a href="https://www.mEshwave.com.br">www.meshwave.com.br</a> |
        <a href="mailto:info@meshwave.com.br">info@meshwave.com.br</a><br>

        <a href="https://wa.me/351914845439">WhatsApp PT</a> |
        <a href="https://wa.me/5521972341965">WhatsApp BR</a>
      </div>
    </div>

  </footer>

  <script type="module" src="/src/main.js"></script>

</body>
</html>

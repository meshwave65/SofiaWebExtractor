<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sofia Web Extractor</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/src/style.css">
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">

    <!-- LEFT -->
    <div class="brand-block">
      <div class="title">Sofia Web Extractor</div>
      <div class="version">Versão 1.0</div>
    </div>

    <!-- CENTER (NAV BUTTONS) -->
    <div class="nav">
      <button onclick="showView('insert')">➕ Insert</button>
      <button onclick="showView('tasks')">📦 Tasks</button>
      <button onclick="showView('files')">📁 Files</button>
      <button onclick="showView('search')">🔎 Search</button>
      <button onclick="showView('profile')">👤 Profile</button>
    </div>

    <!-- RIGHT -->
    <div class="user-block">
      <div class="user-label">Logado como:</div>
      <div id="userLabel" class="user-name">-</div>
    </div>

  </div>

  <!-- VIEWS -->

  <div class="view" id="view-insert">
    <h2>Insert Task</h2>

    <input id="link" placeholder="https://..." />
    <input id="agent" placeholder="agent override" />

    <button onclick="insertTask()">Insert</button>
    <button onclick="clearForm()">Clear</button>
  </div>

  <div class="view" id="view-tasks">
    <h2>Tasks</h2>
    <div id="tasks"></div>
  </div>

  <div class="view" id="view-files">
    <h2>Files</h2>
    <div id="files">Loading...</div>
  </div>

  <div class="view" id="view-search">
    <h2>Search</h2>
    <input placeholder="search..." />
  </div>

  <div class="view" id="view-profile">
    <h2>Profile</h2>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
